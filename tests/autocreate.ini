[user-auto-create]
userId=vals.arkime_user
userName=vals.arkime_user_name
enabled=true
webEnabled=true
headerAuthEnabled=true
emailSearch=true
createEnabled=false
removeEnabled=false
packetSearch=true

[user-role-mappings]
# Base roles for all users
arkimeUser=true
cont3xtUser=true
parliamentUser=true
wiseUser=true
# Grant testRole if userId ends with '-test'
role:testRole=this.userId.endsWith('-test')
# Grant headerRole if x-test-role header equals 'special'
role:headerRole=vals['x-test-role'] === 'special'
# Grant combinedRole if both conditions match
role:combinedRole=this.userId.includes('combo') && vals['x-test-role'] === 'combo'
# Grant securityTeam if JWT department claim is 'security'
role:securityTeam=vals.department === 'security'