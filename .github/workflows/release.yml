name: "Release"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Enter the release tag without leading v (e.g., 1.0.0)'
        required: true

      iteration:
        description: 'Enter the iteration'
        required: true
        default: '1'

permissions:
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          ITERATION: ${{ github.event.inputs.iteration }}
        run: |
          if ! echo "$RELEASE_TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "ERROR - invalid release_tag '$RELEASE_TAG', expected e.g. 1.0.0 or 6.0.0-rc1"
            exit 1
          fi
          if ! echo "$ITERATION" | grep -qE '^[0-9]+$'; then
            echo "ERROR - invalid iteration '$ITERATION', expected a number"
            exit 1
          fi

  generate-matrix:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      freebsdmatrix: ${{ steps.set-matrix.outputs.freebsdmatrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: "refs/tags/v${{ github.event.inputs.release_tag }}"

      - name: Generate Matrix JSON with yq
        id: set-matrix
        run: |
          MATRIX=$(yq -o json eval '{"include": [.include[] | select(.version | test("freebsd") | not)]}' .github/workflows/versions | jq -c)
          FREEBSD_MATRIX=$(yq -o json eval '{"include": [.include[] | select(.version | test("freebsd"))]}' .github/workflows/versions | jq -c)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "freebsdmatrix=$FREEBSD_MATRIX" >> $GITHUB_OUTPUT

  build-release:
    permissions:
      contents: write
      packages: write

    concurrency:
      group: ${{ github.workflow }}-${{ matrix.version }}-${{ github.event.inputs.release_tag }}
      cancel-in-progress: true

    needs: generate-matrix

    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.matrix)}}

    env:
      PYTHON: ${{ matrix.python || 'python' }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
      ITERATION: ${{ github.event.inputs.iteration }}

    runs-on: ${{ matrix.runson || 'ubuntu-latest' }}

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: "refs/tags/v${{ github.event.inputs.release_tag }}"

      - name: thirdparty
        run: |
          (cd / ; curl https://raw.githubusercontent.com/arkime/arkime-test-data/main/snfmin.tar.gz | tar -zxvf -)
          if [ -d "/thirdparty" ]; then
            ln -s /thirdparty .
          fi
          git config --global --add safe.directory `pwd`

      - name: build and install
        run: |
          ./easybutton-build.sh ${{ matrix.buildopt }} --rminstall
          export PATH=/opt/arkime/bin:$PATH
          make install

      - name: package arch
        if: ${{ matrix.package == 'arch' }}
        run: |
          gem install --no-document fpm rexml erb
          export ARKIME_VERSION="$RELEASE_TAG"
          /root/.local/share/gem/ruby/3.4.0/bin/fpm -s dir -t pacman -n arkime -x opt/arkime/logs -x opt/arkime/raw -v $ARKIME_VERSION --iteration "$ITERATION" --template-scripts --after-install "release/afterinstall.sh" --url "https://arkime.com" --description "Arkime Full Packet System" ${{ matrix.fpmdeps }} -p arkime-${ARKIME_VERSION}-${ITERATION}_${{matrix.version}}.pkg.tar.zst /opt/arkime
          ls -l *.zst

      - name: package rpm
        if: ${{ matrix.package == 'rpm' }}
        run: |
          export ARKIME_VERSION="$RELEASE_TAG"
          fpm -s dir -t rpm --rpm-digest sha256 -n arkime -x opt/arkime/logs -x opt/arkime/raw -v $ARKIME_VERSION --iteration "$ITERATION" --template-scripts --after-install "release/afterinstall.sh" --url "https://arkime.com" --description "Arkime Full Packet System" ${{ matrix.fpmdeps }} --rpm-rpmbuild-define "_build_id_links none" -p arkime-${ARKIME_VERSION}-${ITERATION}.${{matrix.version}}.rpm /opt/arkime
          ls -l *.rpm

      - name: Arkime ENV Variables
        run: |
          arch=$(arch | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
          echo "ARKIME_ARCH=$arch" >> $GITHUB_ENV

      - name: ja4plus
        if: ${{ matrix.ja4plus }}
        run: |
          (cd .. ; git clone https://github.com/arkime/ja4)
          cp ../ja4/ja4plus.c capture/plugins
          (cd capture/plugins; make)
          mv capture/plugins/ja4plus.so ja4plus.${{ env.ARKIME_ARCH }}.so
          rm -f capture/plugins/ja4plus.c

      - name: moloch el package rpm
        if: ${{ matrix.version == 'el8.x86_64' || matrix.version == 'el9.x86_64' }}
        run: |
          export ARKIME_VERSION="$RELEASE_TAG"
          rm -rf /data/moloch; mkdir -p /data
          mv /opt/arkime /data/moloch
          ./easybutton-build.sh ${{ matrix.buildopt }} --dir /data/moloch
          (cd capture ; make clean; make; make install)
          (cd release ; make installmoloch)
          mv /data/moloch/bin/capture /data/moloch/bin/moloch-capture
          /bin/cp -f common/version.js /data/moloch/common/

          fpm -s dir -t rpm -n moloch -x data/moloch/logs -x data/moloch/raw -v $ARKIME_VERSION --iteration "$ITERATION" --template-scripts --url "https://arkime.com" --description "Moloch Full Packet System" ${{ matrix.fpmdeps }} --rpm-rpmbuild-define "_build_id_links none" -p moloch-${ARKIME_VERSION}-${ITERATION}.${{matrix.version}}.rpm /data/moloch
          ls -l *.rpm

      - name: package deb
        if: ${{ matrix.package == 'deb' }}
        run: |
          export ARKIME_VERSION="$RELEASE_TAG"
          fpm -s dir -t deb -n arkime -x opt/arkime/logs -x opt/arkime/raw -v $ARKIME_VERSION --iteration "$ITERATION" --template-scripts --after-install "release/afterinstall.sh" --url "https://arkime.com" --description "Arkime Full Packet System" ${{ matrix.fpmdeps }} -p arkime_${ARKIME_VERSION}-${ITERATION}.${{matrix.version}}.deb /opt/arkime
          ls -l *.deb

      - name: notice
        if: ${{ matrix.notice }}
        run: |
          export PATH=/opt/arkime/bin:$PATH
          (npm install license-checker; release/notice.txt.pl /opt/arkime NOTICE release/CAPTURENOTICE > NOTICE.txt)

      - name: upload github
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        with:
          tag_name: "v${{ github.event.inputs.release_tag }}"
          draft: false
          prerelease: true
          generate_release_notes: false
          files: |
            *.deb
            *.so
            *.rpm
            *.zst
            NOTICE.txt
          body: |
            ### [Installation Instructions](https://arkime.com/install) | [5.x -> 6.x Upgrade Instructions](https://arkime.com/faq#how_do_i_upgrade_to_arkime_6) | [FAQ](https://arkime.com/faq) | [CHANGELOG](https://raw.githubusercontent.com/arkime/arkime/main/CHANGELOG) | [JA4+ Install](https://arkime.com/ja4) | [Docker Install](https://arkime.com/docker)

            A db.pl upgrade is required when upgrading from Arkime 5 or earlier

            Support Arkime's ongoing development! Become a **[Sponsor!](https://arkime.com/sponsor)**

            # :sparkles: What's new :sparkles:

            ### :arrow_down: Download Info :arrow_down:
            We offer downloads for different Linux distributions and versions because of library differences. For example, use the el8 download for Centos 8 or RHEL 8 not RHEL 9. A libssl version error means that most likely the wrong download was used for your Linux distribution and version, please double check. The moloch builds have the old filesystem layouts, we will stop providing the moloch builds in 2026. The EL 8 builds will stop in May 2026, please upgrade.

############# DOCKER DOCKER DOCKER #############
      - name: Set up Docker Buildx
        if: matrix.docker
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to registry
        if: matrix.docker
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: matrix.docker
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./release/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/arkime/arkime:v${{ github.event.inputs.release_tag }}-${{ env.ARKIME_ARCH }}
          build-args: |
            ARKIME_TAG=v${{ github.event.inputs.release_tag }}
            ARKIME_BUILD=${{ github.event.inputs.release_tag }}-${{ github.event.inputs.iteration }}

      - name: Build and push ja4
        if: matrix.docker
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./release/Dockerfile.ja4
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/arkime/arkime:v${{ github.event.inputs.release_tag }}-${{ env.ARKIME_ARCH }}-ja4
          build-args: |
            ARKIME_BASE=ghcr.io/${{ github.repository_owner }}/arkime/arkime:v${{ github.event.inputs.release_tag }}-${{ env.ARKIME_ARCH }}

############# FreeBSD Build #############
  freebsd-build:
    needs: [generate-matrix]
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix.outputs.freebsdmatrix)}}

    permissions:
      contents: write
      packages: write

    concurrency:
      group: ${{ github.workflow }}-${{ matrix.version }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    env:
      PYTHON: ${{ matrix.python || 'python' }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}

    runs-on: ${{ matrix.runson || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: "refs/tags/v${{ github.event.inputs.release_tag }}"

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@4441bea20b31bfa77329a5af583199362489567e # v1.4.9
        with:
          release: ${{ matrix.freebsdrelease }}
          arch: ${{ contains(matrix.version, 'aarch64') && 'aarch64' || 'x86_64' }}
          usesh: true
          envs: 'RELEASE_TAG'
          prepare: |
            pkg update -f
            pkg install -y bash git curl perl5 openssl jq yq sudo gmake autoconf automake m4 libtool autoconf-archive gtar pcre2 python3 p5-LWP-Protocol-https p5-JSON p5-Test-Differences p5-Socket6
          run: |
            git config --global --add safe.directory `pwd`
            git config --global --add safe.directory /home/runner/work/arkime/arkime
            ./easybutton-build.sh --dir /usr/local/share/arkime ${{ matrix.buildopt }} --rminstall --nothirdparty
            ls -l capture/capture
            INSTALL_BUNDLE=bundle gmake install
            export ARKIME_VERSION="$RELEASE_TAG"
            arch=$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
            ./release/freebsdpkg.sh $ARKIME_VERSION ${{ matrix.version }} ${{ matrix.version }} /usr/local/share/arkime
            # mv arkime_*.pkg arkime-main.${{matrix.version}}.pkg || true

            ls -l *.pkg

            if [ "${{ matrix.ja4plus }}" = "true" ]; then
              (cd .. ; git clone --single-branch https://github.com/arkime/ja4)
              cp ../ja4/ja4plus.c capture/plugins
              (cd capture/plugins; gmake)
              mv capture/plugins/ja4plus.so ja4plus.freebsd-${arch}.so
              ls -l *.so
            fi

            # Clean up so we don't copy stuff back
            gmake clean
            rm -rf node_modules */node_modules

            ls -l *.pkg

      - name: upload github
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        with:
          tag_name: "v${{ github.event.inputs.release_tag }}"
          draft: false
          prerelease: true
          generate_release_notes: false
          files: |
            *.pkg
            *.so
          body: |
            ### [Installation Instructions](https://arkime.com/install) | [5.x -> 6.x Upgrade Instructions](https://arkime.com/faq#how_do_i_upgrade_to_arkime_6) | [FAQ](https://arkime.com/faq) | [CHANGELOG](https://raw.githubusercontent.com/arkime/arkime/main/CHANGELOG) | [JA4+ Install](https://arkime.com/ja4) | [Docker Install](https://arkime.com/docker)

            A db.pl upgrade is required when upgrading from Arkime 5 or earlier

            Support Arkime's ongoing development! Become a **[GitHub Sponsor!](https://github.com/sponsors/awick)**

            # :sparkles: What's new :sparkles:

            ### :arrow_down: Download Info :arrow_down:
            We offer downloads for different Linux distributions and versions because of library differences. For example, use the el8 download for Centos 8 or RHEL 8 not RHEL 9. A libssl version error means that most likely the wrong download was used for your Linux distribution and version, please double check. The moloch builds have the old filesystem layouts, we will stop providing the moloch builds in 2026. The EL 8 builds will stop in May 2026, please upgrade.

############# Docker Manifest #############
  create-manifest:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
    steps:
      - name: Log in to registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          package="ghcr.io/${{ github.repository_owner }}/arkime/arkime"
          export ARKIME_MAJOR_VERSION=`echo "$RELEASE_TAG" | cut -c 1-1`

          create_and_push() {
            local tag=$1
            local extra=$2

            docker manifest create ${package}:${tag} \
              ${package}:v${RELEASE_TAG}-amd64${extra} \
              ${package}:v${RELEASE_TAG}-arm64${extra}
            docker manifest annotate ${package}:${tag} \
              ${package}:v${RELEASE_TAG}-amd64${extra} --arch amd64
            docker manifest annotate ${package}:${tag} \
              ${package}:v${RELEASE_TAG}-arm64${extra} --arch arm64
            docker manifest push ${package}:${tag}
          }

          ### Normal ###
          create_and_push "v${RELEASE_TAG}" ""
          create_and_push "v${ARKIME_MAJOR_VERSION}-latest" ""
          create_and_push "latest" ""

          ### JA4+ ###
          create_and_push "v${RELEASE_TAG}-ja4" "-ja4"
          create_and_push "v${ARKIME_MAJOR_VERSION}-ja4-latest" "-ja4"
          create_and_push "ja4-latest" "-ja4"

############# Slack Message#############
  slack:
    runs-on: ubuntu-latest
    needs:
      - build-release
    steps:
      - name: send
        env:
          SLACK_URL: ${{ secrets.SLACK_URL }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          echo "Sending msg"
          export ARKIME_VERSION="v$RELEASE_TAG"
          echo ARKIME_VERSION: $ARKIME_VERSION
          BODY="{\"icon_emoji\": \":sushi:\", \"username\": \"GitAction\", \"text\":\"Release $ARKIME_VERSION worked!!!\"}"
          curl -XPOST -H "Content-type: application/json" --data "$BODY" $SLACK_URL

